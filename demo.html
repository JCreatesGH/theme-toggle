<!doctype html><html><head><meta charset="utf-8"><title>theme-toggle demo</title>
<meta name="theme-color" content="#ffffff">
<style>
  :root { --bg:#ffffff; --fg:#1a1a1a; --card:#f4f4f5; --accent:#6366f1; --muted:#71717a; }
  [data-theme="dark"] { --bg:#0f1117; --fg:#e6edf3; --card:#1b1f2a; --accent:#818cf8; --muted:#9aa4b2; }
  body { background:var(--bg); color:var(--fg); font-family:system-ui; margin:0; padding:48px;
         transition:background .25s, color .25s; }
  .card { background:var(--card); padding:24px; border-radius:14px; max-width:460px; }
  button { background:var(--accent); color:#fff; border:0; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:14px; }
  .row { display:flex; gap:10px; margin-top:16px; }
  small { color:var(--muted); }
  input[type=date] { margin-top:14px; }   /* native control follows color-scheme */
</style></head>
<body>
  <div class="card">
    <h1>theme-toggle</h1>
    <p>Choice: <strong id="choice"></strong> · Resolved: <strong id="now"></strong></p>
    <div class="row">
      <button id="toggle">Toggle</button>
      <button id="cycle">Cycle (light → dark → system)</button>
    </div>
    <input type="date" aria-label="native control demo">
    <p><small>The native date control, scrollbars, and the mobile browser chrome
      (<code>theme-color</code>) all track the theme automatically.</small></p>
  </div>
  <script type="module">
    import { ThemeEngine } from "./src/core.ts";
    const engine = new ThemeEngine({
      themeColor: { light: "#ffffff", dark: "#0f1117" },   // syncs <meta name=theme-color>
      // colorScheme is on by default → native controls match
    });
    const show = () => {
      document.getElementById("choice").textContent = engine.theme;
      document.getElementById("now").textContent = engine.resolved;
    };
    engine.subscribe(show); show();
    document.getElementById("toggle").onclick = () => { engine.toggle(); show(); };
    document.getElementById("cycle").onclick = () => { engine.cycle(); show(); };
  </script>
</body></html>
